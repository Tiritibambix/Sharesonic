name: CI

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        if: github.ref_type != 'tag'
        run: ./gradlew assembleDebug --no-daemon -PartifactRun=${{ github.run_number }} -PversionCode=${{ github.run_number }}

      - name: Upload debug APK
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: sharesonic-artifact+${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode keystore
        if: github.ref_type == 'tag'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Derive version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"
          echo "APP_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"

      - name: Build release APK
        if: github.ref_type == 'tag'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon -PversionName=$APP_VERSION_NAME -PversionCode=${{ github.run_number }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true